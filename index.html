<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Booklet</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #fcf8f5;
            overflow-y: scroll;
            /* Ito ang magic para sa booklet-type snap */
            scroll-snap-type: y mandatory;
        }

        .page {
            width: 100%;
            height: 100vh; /* Bawat image ay sasakop sa buong screen */
            display: flex;
            justify-content: center;
            align-items: center;
            scroll-snap-align: start;
        }

        .page img {
            max-width: 90%;
            max-height: 90%;
            object-fit: contain;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>

    <div class="page">
        <img src="img1.jpg" alt="Page 1">
    </div>

    <div class="page">
        <img src="img2.jpg" alt="Page 2">
    </div>

</body>
</html>
