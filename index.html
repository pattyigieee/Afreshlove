<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Love Written</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Montserrat:wght@300;400&display=swap');

        body {
            background-color: #fcf8f5;
            color: #333;
            font-family: 'Montserrat', sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .book-container {
            width: 90%;
            max-width: 500px;
            background: #fff;
            padding: 40px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            text-align: center;
            border: 1px solid #eee;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 24px;
            font-style: italic;
            margin-bottom: 10px;
            color: #555;
        }

        .date-line {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #aaa;
            margin-bottom: 40px;
        }

        .message-body {
            font-size: 16px;
            line-height: 1.8;
            font-weight: 300;
            margin-bottom: 40px;
        }

        .divider {
            width: 50px;
            height: 1px;
            background: #ddd;
            margin: 0 auto 40px;
        }

        .footer-quote {
            font-family: 'Playfair Display', serif;
            font-size: 18px;
            font-style: italic;
            color: #777;
        }
    </style>
</head>
<body>

<div class="book-container">
    <h1>A love fresh </h1>
    <div class="date-line">July 18, 2026</div>
    
    <div class="message-body">
        a magical year You gave me new perspectives and fresh definitions of love, 

    <div class="divider"></div>

    <div class="footer-quote">To Love as a Lifelong Lesson.</div>
</div>

</body>
